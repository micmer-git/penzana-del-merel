<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordini — La Penzana del Merel</title>
<style>
  :root {
    --blue-deep: #8f0f2f;
    --blue-mid: #c2184f;
    --accent-gold: #f7b8cd;
    --bg: #faf8f5;
    --white: #fff;
    --text: #1e1e2e;
    --text-muted: #6b7280;
    --slate-xlight: #e8e6e1;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --amber: #d97706;
    --amber-bg: #fef3c7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  header {
    background: var(--blue-deep);
    color: var(--white);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    font-size: 0.85rem;
    opacity: 0.9;
  }
  .stats-bar strong { font-size: 1.1rem; }
  .tabs {
    display: flex;
    gap: 0;
    background: var(--white);
    border-bottom: 2px solid var(--slate-xlight);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab {
    padding: 0.75rem 1.5rem;
    border: none;
    background: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--blue-deep); border-bottom-color: var(--blue-deep); }
  .tab:hover { color: var(--blue-mid); }
  main { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

  /* Orders list */
  .order-card {
    background: var(--white);
    border: 1px solid var(--slate-xlight);
    border-left: 4px solid var(--blue-deep);
    border-radius: 6px;
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
    transition: box-shadow 0.2s;
  }
  .order-card.has-messages { border-left-color: var(--amber); }
  .order-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .order-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.5rem;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .order-customer {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--blue-deep);
  }
  .order-meta {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-align: right;
  }
  .order-items {
    font-size: 0.88rem;
    color: var(--text);
    margin-bottom: 0.4rem;
  }
  .order-items li {
    list-style: none;
    padding: 0.15rem 0;
  }
  .order-items li::before { content: '\2022 '; color: var(--blue-mid); }
  .order-mods { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }
  .order-total {
    font-weight: 700;
    font-size: 0.95rem;
    margin-top: 0.4rem;
    padding-top: 0.4rem;
    border-top: 1px solid var(--slate-xlight);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .pizza-badge {
    background: var(--accent-gold);
    color: var(--blue-deep);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.15rem 0.5rem;
    border-radius: 99px;
  }
  .msg-badge {
    background: var(--amber-bg);
    color: var(--amber);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.12rem 0.45rem;
    border-radius: 99px;
    margin-left: 0.4rem;
    cursor: pointer;
  }
  .tracking-label {
    font-family: monospace;
    font-size: 0.75rem;
    color: var(--blue-mid);
    background: var(--accent-gold);
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-left: 0.4rem;
  }
  .status-toggle {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 700;
    cursor: pointer;
    border: none;
    margin-left: 0.3rem;
  }
  .status-pending { background: var(--amber-bg); color: var(--amber); }
  .status-approved { background: var(--green-bg); color: var(--green); }
  .status-rejected { background: #fef2f2; color: #dc2626; }
  .status-completed { background: var(--slate-xlight); color: var(--text-muted); }
  .est-minutes-row { display: flex; align-items: center; gap: .4rem; margin-top: .4rem; font-size: .78rem; }
  .est-minutes-input { width: 3.5rem; padding: .2rem .4rem; border: 1px solid var(--slate-xlight); border-radius: 4px; font-size: .82rem; text-align: center; }
  .est-minutes-btn { padding: .2rem .5rem; background: var(--blue-deep); color: var(--white); border: none; border-radius: 4px; font-size: .72rem; font-weight: 600; cursor: pointer; }
  .est-minutes-btn:hover { background: var(--blue-mid); }
  .order-notes {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
    font-style: italic;
  }
  .delete-btn {
    background: none;
    border: 1px solid var(--slate-xlight);
    color: var(--text-muted);
    font-size: 0.75rem;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .delete-btn:hover { border-color: #dc2626; color: #dc2626; }

  /* Messages section in order card */
  .order-messages {
    display: none;
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px dashed var(--slate-xlight);
  }
  .order-messages.open { display: block; }
  .order-messages h4 {
    font-size: 0.78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }
  .admin-msg-thread {
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 0.5rem;
  }
  .admin-msg {
    font-size: 0.82rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid var(--slate-xlight);
  }
  .admin-msg:last-child { border-bottom: none; }
  .admin-msg-sender {
    font-weight: 700;
    font-size: 0.72rem;
    text-transform: uppercase;
  }
  .admin-msg-sender.customer { color: var(--blue-deep); }
  .admin-msg-sender.pizzeria { color: var(--green); }
  .admin-msg-time { font-size: 0.68rem; color: var(--text-muted); }
  .admin-msg-empty { font-size: 0.82rem; color: var(--text-muted); font-style: italic; }
  .admin-reply-row {
    display: flex;
    gap: 0.3rem;
  }
  .admin-reply-row input {
    flex: 1;
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--slate-xlight);
    border-radius: 4px;
    font-size: 0.82rem;
  }
  .admin-reply-row input:focus { outline: none; border-color: var(--blue-deep); }
  .admin-reply-btn {
    padding: 0.35rem 0.6rem;
    background: var(--blue-deep);
    color: var(--white);
    border: none;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
  }
  .admin-reply-btn:hover { background: var(--blue-mid); }
  .toggle-msgs-btn {
    background: none;
    border: none;
    color: var(--blue-mid);
    font-size: 0.75rem;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
    margin-left: 0.3rem;
  }

  /* Ranking */
  .ranking-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--white);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .ranking-table th {
    background: var(--blue-deep);
    color: var(--white);
    padding: 0.75rem 1rem;
    text-align: left;
    font-size: 0.82rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ranking-table td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--slate-xlight);
    font-size: 0.9rem;
  }
  .ranking-table tr:hover td { background: rgba(247,184,205,0.08); }
  .rank-num {
    font-weight: 800;
    color: var(--blue-deep);
    font-size: 1.1rem;
  }
  .rank-1 .rank-num { color: #d4a017; }
  .rank-2 .rank-num { color: #94a3b8; }
  .rank-3 .rank-num { color: #b45309; }
  .rank-name { font-weight: 600; }

  /* Filo stats */
  .filo-card {
    background: linear-gradient(135deg, var(--blue-deep), var(--blue-mid));
    color: var(--white);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .filo-card h2 { font-size: 1rem; opacity: 0.8; margin-bottom: 0.5rem; }
  .filo-number { font-size: 2.5rem; font-weight: 800; }
  .filo-sub { font-size: 0.85rem; opacity: 0.7; margin-top: 0.25rem; }

  .panel { display: none; }
  .panel.active { display: block; }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .date-filter {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .date-filter label { font-size: 0.85rem; font-weight: 600; }
  .date-filter select, .date-filter input {
    padding: 0.4rem 0.6rem;
    border: 1px solid var(--slate-xlight);
    border-radius: 4px;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

<header>
  <h1>La Penzana del Merel — Ordini</h1>
  <div class="stats-bar">
    <span>Ordini: <strong id="stat-orders">0</strong></span>
    <span>Pizze: <strong id="stat-pizzas">0</strong></span>
    <span>Filo d'oro: <strong id="stat-filo">0 m</strong></span>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="orders">Ordini</button>
  <button class="tab" data-tab="ranking">Classifica</button>
  <button class="tab" data-tab="filo">Filo d'Oro</button>
</div>

<main>
  <!-- Orders panel -->
  <div class="panel active" id="panel-orders">
    <div class="date-filter">
      <label>Filtra:</label>
      <select id="filter-period">
        <option value="today">Oggi</option>
        <option value="week">Questa settimana</option>
        <option value="month">Questo mese</option>
        <option value="all" selected>Tutti</option>
      </select>
    </div>
    <div id="orders-list"></div>
  </div>

  <!-- Ranking panel -->
  <div class="panel" id="panel-ranking">
    <div id="ranking-content"></div>
  </div>

  <!-- Filo panel -->
  <div class="panel" id="panel-filo">
    <div id="filo-content"></div>
  </div>
</main>

<script>
const API = window.location.origin;
const PIZZA_DIAMETER_CM = 33;

let allOrders = [];
let stats = {};

// ---- Tabs ----
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ---- Fetch data ----
async function loadData() {
  try {
    const [ordersRes, statsRes] = await Promise.all([
      fetch(API + '/api/orders'),
      fetch(API + '/api/stats'),
    ]);
    allOrders = await ordersRes.json();
    stats = await statsRes.json();
  } catch (err) {
    console.error('Failed to load data:', err);
    allOrders = [];
    stats = { totalPizzas: 0, totalOrders: 0, ranking: [] };
  }

  updateHeader();
  renderOrders();
  renderRanking();
  renderFilo();
}

function updateHeader() {
  document.getElementById('stat-orders').textContent = stats.totalOrders || 0;
  document.getElementById('stat-pizzas').textContent = stats.totalPizzas || 0;
  const meters = ((stats.totalPizzas || 0) * PIZZA_DIAMETER_CM / 100).toFixed(1);
  document.getElementById('stat-filo').textContent = meters + ' m';
}

// ---- Orders ----
function renderOrders() {
  const container = document.getElementById('orders-list');
  const filter = document.getElementById('filter-period').value;
  const now = new Date();
  const filtered = allOrders.filter(o => {
    const d = new Date(o.timestamp);
    if (filter === 'today') return d.toDateString() === now.toDateString();
    if (filter === 'week') {
      const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 7);
      return d >= weekAgo;
    }
    if (filter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state">Nessun ordine trovato.</div>';
    return;
  }

  container.innerHTML = filtered.map(o => {
    const date = new Date(o.timestamp);
    const timeStr = date.toLocaleString('it-IT', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    const modeLabel = o.orderMode === 'delivery'
      ? 'Consegna \u2014 ' + (o.deliveryAddress || '')
      : o.tableId ? o.tableId.replace('table-', 'Tavolo ') : 'Tavolo ?';

    const msgCount = o.messageCount || 0;
    const hasMsgs = msgCount > 0;
    const cardClass = hasMsgs ? 'order-card has-messages' : 'order-card';

    const trackingHtml = o.trackingId ? '<span class="tracking-label">' + escapeHtml(o.trackingId) + '</span>' : '';
    const msgBadgeHtml = hasMsgs ? '<span class="msg-badge" data-id="' + o.id + '" title="Mostra messaggi">' + msgCount + ' msg</span>' : '';

    const status = o.status || 'pending';
    const statusLabels = { pending: 'In attesa', approved: 'Approvato', rejected: 'Rifiutato', completed: 'Completato' };
    const statusHtml = '<button class="status-toggle status-' + status + '" data-id="' + o.id + '" data-status="' + status + '">' + (statusLabels[status] || status) + '</button>';

    // Status action buttons
    let statusActionsHtml = '';
    if (status === 'pending') {
      statusActionsHtml = '<button class="status-toggle status-approved" data-id="' + o.id + '" data-new-status="approved">Approva</button> '
        + '<button class="status-toggle status-rejected" style="font-size:.68rem" data-id="' + o.id + '" data-new-status="rejected">Rifiuta</button>';
    } else if (status === 'approved') {
      statusActionsHtml = '<button class="status-toggle status-completed" data-id="' + o.id + '" data-new-status="completed">Completato</button> '
        + '<button class="status-toggle status-rejected" style="font-size:.68rem" data-id="' + o.id + '" data-new-status="rejected">Rifiuta</button>';
    } else {
      statusActionsHtml = '<button class="status-toggle status-pending" data-id="' + o.id + '" data-new-status="pending">Riapri</button>';
    }

    // Estimated minutes
    const estMin = o.estimatedMinutes != null ? o.estimatedMinutes : '';
    const estMinHtml = (status === 'pending' || status === 'approved')
      ? '<div class="est-minutes-row">'
        + '<span>Tempo:</span>'
        + '<input type="number" class="est-minutes-input" id="est-min-' + o.id + '" value="' + escapeHtml(String(estMin)) + '" min="1" max="180" placeholder="min" />'
        + '<button class="est-minutes-btn" data-id="' + o.id + '">Salva</button>'
        + '</div>'
      : '';

    const itemsHtml = (o.items || []).map(item => {
      const size = item.size ? ' (' + item.size + ')' : '';
      const mods = [];
      if (item.removed && item.removed.length) mods.push('senza: ' + item.removed.join(', '));
      if (item.added && item.added.length) mods.push('con: ' + item.added.join(', '));
      const modsHtml = mods.length ? '<span class="order-mods"> \u2014 ' + mods.join(' | ') + '</span>' : '';
      const noteHtml = item.note ? '<span class="order-mods"> \u2014 ' + item.note + '</span>' : '';
      return '<li>' + item.name + size + ' x' + item.qty + ' \u2014 ' + formatPrice(item.price * item.qty) + modsHtml + noteHtml + '</li>';
    }).join('');

    const notesHtml = o.notes ? '<div class="order-notes">Note: ' + escapeHtml(o.notes) + '</div>' : '';

    const toggleBtn = '<button class="toggle-msgs-btn" data-id="' + o.id + '">messaggi</button>';

    return '<div class="' + cardClass + '" id="card-' + o.id + '">' +
      '<div class="order-header">' +
        '<div><span class="order-customer">' + escapeHtml(o.customerName) + '</span>' + trackingHtml + msgBadgeHtml + statusHtml + ' ' + statusActionsHtml +
        '<div style="font-size:0.78rem;color:var(--text-muted)">' + modeLabel + '</div></div>' +
        '<div class="order-meta">' + timeStr +
        '<br><button class="delete-btn" data-id="' + o.id + '">Elimina</button> ' + toggleBtn + '</div>' +
      '</div>' +
      '<ul class="order-items">' + itemsHtml + '</ul>' +
      notesHtml +
      estMinHtml +
      '<div class="order-total">' +
        '<span>Totale: ' + formatPrice(o.totalPrice) + '</span>' +
        (o.pizzaCount > 0 ? '<span class="pizza-badge">' + o.pizzaCount + ' pizze</span>' : '') +
      '</div>' +
      '<div class="order-messages" id="msgs-' + o.id + '">' +
        '<h4>Messaggi</h4>' +
        '<div class="admin-msg-thread" id="thread-' + o.id + '"><div class="admin-msg-empty">Caricamento...</div></div>' +
        '<div class="admin-reply-row">' +
          '<input type="text" id="reply-input-' + o.id + '" placeholder="Rispondi..." maxlength="500" />' +
          '<button class="admin-reply-btn" data-id="' + o.id + '">Invia</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Delete handlers
  container.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Eliminare questo ordine?')) return;
      await fetch(API + '/api/orders/' + btn.dataset.id, { method: 'DELETE' });
      loadData();
    });
  });

  // Status action handlers (buttons with data-new-status)
  container.querySelectorAll('.status-toggle[data-new-status]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const newStatus = btn.dataset.newStatus;
      await fetch(API + '/api/orders/' + btn.dataset.id + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus }),
      });
      loadData();
    });
  });

  // Estimated minutes save handlers
  container.querySelectorAll('.est-minutes-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      const input = document.getElementById('est-min-' + id);
      if (!input) return;
      const val = input.value.trim();
      const minutes = val ? parseInt(val) : null;
      const order = allOrders.find(o => o.id === id);
      const newStatus = order && order.status === 'pending' ? 'approved' : (order ? order.status : 'approved');
      await fetch(API + '/api/orders/' + id + '/status', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus, estimatedMinutes: minutes }),
      });
      loadData();
    });
  });

  // Toggle messages handlers
  container.querySelectorAll('.toggle-msgs-btn, .msg-badge').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const msgsEl = document.getElementById('msgs-' + id);
      if (msgsEl.classList.contains('open')) {
        msgsEl.classList.remove('open');
      } else {
        msgsEl.classList.add('open');
        loadMessages(id);
      }
    });
  });

  // Reply handlers
  container.querySelectorAll('.admin-reply-btn').forEach(btn => {
    btn.addEventListener('click', () => sendAdminReply(btn.dataset.id));
  });
  container.querySelectorAll('.admin-reply-row input').forEach(input => {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const id = input.id.replace('reply-input-', '');
        sendAdminReply(id);
      }
    });
  });
}

async function loadMessages(orderId) {
  const thread = document.getElementById('thread-' + orderId);
  try {
    const resp = await fetch(API + '/api/orders/' + orderId + '/messages');
    const messages = await resp.json();
    if (messages.length === 0) {
      thread.innerHTML = '<div class="admin-msg-empty">Nessun messaggio.</div>';
      return;
    }
    thread.innerHTML = messages.map(m => {
      const senderCls = m.sender === 'customer' ? 'customer' : 'pizzeria';
      const label = m.sender === 'customer' ? 'Cliente' : 'Ristorante';
      return '<div class="admin-msg">' +
        '<span class="admin-msg-sender ' + senderCls + '">' + label + '</span> ' +
        '<span class="admin-msg-time">' + (m.created_at || '') + '</span>' +
        '<div>' + escapeHtml(m.text) + '</div>' +
      '</div>';
    }).join('');
    thread.scrollTop = thread.scrollHeight;
  } catch {
    thread.innerHTML = '<div class="admin-msg-empty">Errore caricamento messaggi.</div>';
  }
}

async function sendAdminReply(orderId) {
  const input = document.getElementById('reply-input-' + orderId);
  const text = input.value.trim();
  if (!text) return;
  try {
    await fetch(API + '/api/orders/' + orderId + '/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    input.value = '';
    loadMessages(orderId);
    // Refresh to update badge count
    setTimeout(loadData, 500);
  } catch {}
}

document.getElementById('filter-period').addEventListener('change', renderOrders);

// ---- Ranking ----
function renderRanking() {
  const container = document.getElementById('ranking-content');
  const ranking = stats.ranking || [];

  if (ranking.length === 0) {
    container.innerHTML = '<div class="empty-state">Nessun dato disponibile.</div>';
    return;
  }

  let html = '<table class="ranking-table"><thead><tr>' +
    '<th>#</th><th>Nome</th><th>Pizze</th><th>Ordini</th><th>Spesa Totale</th>' +
    '</tr></thead><tbody>';

  ranking.forEach((r, i) => {
    const rankClass = i < 3 ? ' rank-' + (i + 1) : '';
    const medal = i === 0 ? ' \uD83E\uDD47' : i === 1 ? ' \uD83E\uDD48' : i === 2 ? ' \uD83E\uDD49' : '';
    html += '<tr class="' + rankClass + '">' +
      '<td><span class="rank-num">' + (i + 1) + '</span>' + medal + '</td>' +
      '<td class="rank-name">' + escapeHtml(r.name) + '</td>' +
      '<td>' + r.pizzas + '</td>' +
      '<td>' + r.orders + '</td>' +
      '<td>' + formatPrice(r.totalSpent) + '</td>' +
      '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
}

// ---- Filo d'oro ----
function renderFilo() {
  const totalPizzas = stats.totalPizzas || 0;
  const totalCm = totalPizzas * PIZZA_DIAMETER_CM;
  const meters = (totalCm / 100).toFixed(1);
  const km = (totalCm / 100000).toFixed(3);

  const container = document.getElementById('filo-content');
  container.innerHTML =
    '<div class="filo-card">' +
      '<h2>Il Filo d\'Oro delle Pizze Ordinate</h2>' +
      '<div class="filo-number">' + meters + ' m</div>' +
      '<div class="filo-sub">' + totalPizzas + ' pizze \u00D7 33 cm = ' + km + ' km</div>' +
      '<div class="filo-sub" style="margin-top:0.75rem;opacity:0.6">Diametro pizza: 33 cm | Aggiornato in tempo reale dagli ordini</div>' +
    '</div>';
}

// ---- Helpers ----
function formatPrice(n) { return (n || 0).toFixed(2).replace('.', ',') + ' \u20AC'; }
function escapeHtml(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ---- Init ----
loadData();
// Auto-refresh every 30s
setInterval(loadData, 30000);
</script>
